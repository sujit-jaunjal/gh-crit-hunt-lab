name: cache-idor-focused
on: workflow_dispatch
permissions:
  contents: read
  actions: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "actor_repo=${{ github.repository }}"
          for repo in sujit-jaunjal/app-authz-public sujit-jaunjal/app-authz-private sujit-jaunjal/gh-crit-hunt-lab octocat/Hello-World; do
            echo "==== LIST caches $repo ===="
            code=$(curl -sS -o /tmp/out.json -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$repo/actions/caches")
            echo "HTTP $code"
            python3 -c 'import json;d=json.load(open("/tmp/out.json"));
print("keys",list(d)[:8] if isinstance(d,dict) else type(d));
print("total",d.get("total_count") if isinstance(d,dict) else None);
print("names",[c.get("key") for c in (d.get("actions_caches") or [])[:5]] if isinstance(d,dict) else d)'
          done
          # If we can see sibling cache keys, try to restore via actions/cache with wrong scope - won't work via action easily
          # Try caches API delete on sibling (destructive write)
          echo "==== try get cache usage ===="
          for repo in sujit-jaunjal/app-authz-public sujit-jaunjal/app-authz-private; do
            code=$(curl -sS -o /tmp/u.json -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$repo/actions/cache/usage")
            echo "usage $repo HTTP $code $(head -c 200 /tmp/u.json)"
          done
